<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartRevise — Study Smarter</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/style.css" />
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="page-wrap">

    <header class="header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">Smart<span class="accent">Revise</span></span>
      </div>
      <p class="tagline">Drop your notes. Get a summary, key concepts &amp; quiz — instantly.</p>
    </header>

    <div class="card input-card">
      <div class="card-label">Your Study Material</div>
      <textarea id="studyText" rows="9" placeholder="Paste your lecture notes, textbook chapter, or any study content here..."></textarea>
      <div class="char-row">
        <small id="charCount">0 characters</small>
        <small class="hint">min 50 characters</small>
      </div>

      <div class="mode-section">
        <div class="mode-label">What do you want?</div>
        <div class="modes">
          <button class="mode-btn active" data-mode="all">✦ Everything</button>
          <button class="mode-btn" data-mode="summary">📄 Summary</button>
          <button class="mode-btn" data-mode="concepts">🧠 Key Concepts</button>
          <button class="mode-btn" data-mode="quiz">❓ Quiz Me</button>
        </div>
      </div>

      <button id="generateBtn" onclick="processText()">
        Generate <span class="btn-arrow">→</span>
      </button>
    </div>

    <div id="errorMsg" class="error-box hidden"></div>

    <div id="results" class="hidden">

      <div id="summaryBox" class="card result-card hidden">
        <div class="result-header" style="--accent:#F97316;">
          <span>📄</span><h2>Summary</h2>
        </div>
        <div id="summaryText" class="result-body"></div>
      </div>

      <div id="conceptsBox" class="card result-card hidden">
        <div class="result-header" style="--accent:#8B5CF6;">
          <span>🧠</span><h2>Key Concepts</h2>
        </div>
        <div id="conceptsList" class="result-body"></div>
      </div>

      <div id="quizBox" class="card result-card hidden">
        <div class="result-header" style="--accent:#06B6D4;">
          <span>❓</span><h2>Quiz</h2>
        </div>
        <div id="quizList" class="result-body"></div>
        <div class="quiz-footer">
          <button class="check-btn" onclick="checkAnswers()">Check Answers ✓</button>
          <p id="score" class="score hidden"></p>
        </div>
      </div>

      <div class="export-row">
        <button class="export-btn" onclick="exportText()">↓ Export as .txt</button>
      </div>

    </div>
  </div>

  <div id="loading" class="loading hidden">
    <div class="loading-card">
      <div class="spinner"></div>
      <p class="loading-text">Generating your study set...</p>
    </div>
  </div>

  <script src="../static/js/main.js"></script>
</body>
</html>
