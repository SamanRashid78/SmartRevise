<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Study Assistant</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <div class="header">
    <h1>Smart Study Assistant</h1>
    <p>Paste your notes to get a summary, key concepts, and quiz questions</p>
  </div>

  <div class="container">

    <div class="input-section">
      <label for="studyText"><strong>Your Study Material:</strong></label>
      <textarea id="studyText" rows="10" placeholder="Paste your notes or textbook content here..."></textarea>
      <small id="charCount">0 characters</small>

      <div class="mode-select">
        <label><strong>What do you want to generate?</strong></label>
        <div class="modes">
          <button class="mode-btn active" data-mode="all">Everything</button>
          <button class="mode-btn" data-mode="summary">Summary</button>
          <button class="mode-btn" data-mode="concepts">Key Concepts</button>
          <button class="mode-btn" data-mode="quiz">Quiz</button>
        </div>
      </div>

      <button id="generateBtn" onclick="processText()">Generate</button>
    </div>

    <div id="errorMsg" class="error hidden"></div>

    <div id="results" class="hidden">

      <div id="summaryBox" class="result-card hidden">
        <h2>Summary</h2>
        <div id="summaryText"></div>
      </div>

      <div id="conceptsBox" class="result-card hidden">
        <h2>Key Concepts</h2>
        <div id="conceptsList"></div>
      </div>

      <div id="quizBox" class="result-card hidden">
        <h2>Quiz</h2>
        <div id="quizList"></div>
        <button onclick="checkAnswers()">Check Answers</button>
        <p id="score" class="hidden"></p>
      </div>

      <button class="export-btn" onclick="exportText()">Export as .txt</button>
    </div>

  </div>

  <div id="loading" class="loading hidden">
    <p>Loading, please wait...</p>
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
