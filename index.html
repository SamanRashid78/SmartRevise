<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Study Assistant</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
</head>
<body>

  <header class="header">
    <div class="logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">StudyAI</span>
    </div>
    <p class="tagline">Paste your notes. Get summaries, concepts & quizzes — instantly.</p>
  </header>

  <main class="container">

    <!-- INPUT PANEL -->
    <section class="input-panel">
      <div class="panel-label">Your Study Material</div>
      <textarea
        id="studyText"
        placeholder="Paste your lecture notes, textbook excerpts, or any study content here..."
        rows="12"
      ></textarea>
      <div class="input-meta">
        <span id="charCount">0 / 10,000 characters</span>
      </div>

      <div class="mode-row">
        <label class="mode-label">Generate:</label>
        <div class="mode-buttons">
          <button class="mode-btn active" data-mode="all">Everything</button>
          <button class="mode-btn" data-mode="summary">Summary only</button>
          <button class="mode-btn" data-mode="concepts">Concepts only</button>
          <button class="mode-btn" data-mode="quiz">Quiz only</button>
        </div>
      </div>

      <button id="processBtn" class="process-btn" onclick="processText()">
        <span class="btn-text">Generate Study Set</span>
        <span class="btn-icon">→</span>
      </button>
    </section>

    <!-- ERROR -->
    <div id="errorBox" class="error-box hidden"></div>

    <!-- OUTPUT AREA -->
    <section id="outputArea" class="output-area hidden">

      <div class="output-header">
        <h2>Your Study Set</h2>
        <button class="export-btn" onclick="exportContent()">⬇ Export</button>
      </div>

      <!-- SUMMARY -->
      <div id="summarySection" class="output-card hidden">
        <div class="card-header">
          <span class="card-icon">📝</span>
          <h3>Summary</h3>
        </div>
        <div id="summaryContent" class="card-body"></div>
      </div>

      <!-- KEY CONCEPTS -->
      <div id="conceptsSection" class="output-card hidden">
        <div class="card-header">
          <span class="card-icon">🔑</span>
          <h3>Key Concepts</h3>
        </div>
        <div id="conceptsContent" class="card-body concepts-grid"></div>
      </div>

      <!-- QUIZ -->
      <div id="quizSection" class="output-card hidden">
        <div class="card-header">
          <span class="card-icon">❓</span>
          <h3>Quiz Questions</h3>
        </div>
        <div id="quizContent" class="card-body quiz-list"></div>
        <div class="quiz-footer">
          <button class="check-btn" onclick="checkAnswers()">Check Answers</button>
          <span id="quizScore" class="quiz-score hidden"></span>
        </div>
      </div>

    </section>

  </main>

  <footer class="footer">
    <p>Smart Study Assistant — CS Project · Powered by Claude AI</p>
  </footer>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loader-box">
      <div class="spinner"></div>
      <p id="loadingMsg">Analyzing your notes...</p>
    </div>
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
